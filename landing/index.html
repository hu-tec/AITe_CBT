<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AITe CBT - AI 자격인증 시험 플랫폼</title>
  <meta name="description" content="AI 교육 및 자격인증을 위한 CBT 시험 플랫폼">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", Roboto, "Helvetica Neue", Arial, "Malgun Gothic", sans-serif;
      background: #f9fafb;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      -webkit-font-smoothing: antialiased;
    }
    .card { text-align: center; max-width: 480px; width: 100%; }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1.2;
      color: #111827;
      margin-bottom: 0.75rem;
    }
    h1 .accent { color: #2563eb; }
    .tagline {
      font-size: 1.125rem;
      color: #4b5563;
      margin-bottom: 0.25rem;
    }
    .sub {
      font-size: 0.875rem;
      color: #9ca3af;
      margin-bottom: 2rem;
    }
    .btns {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      padding: 0.625rem 1.5rem;
      border-radius: 0.375rem;
      font-size: 0.9375rem;
      font-weight: 500;
      text-decoration: none;
      transition: background-color 0.15s ease;
      border: 1px solid transparent;
      cursor: pointer;
    }
    .btn-primary {
      background: #2563eb;
      color: #ffffff;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .btn-secondary:hover { background: #d1d5db; }
    .footer-note {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>AITe <span class="accent">CBT</span></h1>
    <p class="tagline">AI 교육 및 자격인증 시험 플랫폼</p>
    <p class="sub">학습부터 모의시험, 자격인증까지</p>
    <div class="btns">
      <a href="http://54.116.15.136:82/login" class="btn btn-primary">로그인</a>
      <a href="http://54.116.15.136:82/register" class="btn btn-secondary">회원가입</a>
    </div>
    <p class="footer-note">시험 응시는 위 버튼을 눌러 진행해 주세요.</p>
  </main>
</body>
</html>
